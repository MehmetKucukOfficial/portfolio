<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a0c"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a1a"/>
      <stop offset="100%" style="stop-color:#0d2d0d"/>
    </linearGradient>
    <linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0a1a0a;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="p1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
    <linearGradient id="p2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="p3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
    <linearGradient id="p4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a044e"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>
    <linearGradient id="p5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="p6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#713f12"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="uploadBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="winShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="25" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="win">
      <rect x="30" y="24" width="740" height="402" rx="10"/>
    </clipPath>
  </defs>

  <!-- Page bg -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.7" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>

  <!-- Browser window -->
  <rect x="30" y="24" width="740" height="402" rx="10" fill="#111" filter="url(#winShadow)"/>

  <!-- Title bar -->
  <rect x="30" y="24" width="740" height="32" rx="10" fill="#1a1a1a"/>
  <rect x="30" y="44" width="740" height="12" fill="#1a1a1a"/>
  <circle cx="54" cy="40" r="6" fill="#ff5f57"/>
  <circle cx="74" cy="40" r="6" fill="#febc2e"/>
  <circle cx="94" cy="40" r="6" fill="#28c840"/>
  <rect x="130" y="32" width="400" height="16" rx="8" fill="#0d0d0d"/>
  <text x="190" y="43" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#555">🔒  localhost:3000</text>

  <!-- ── HERO / VIDEO BG SECTION ── -->
  <rect x="30" y="56" width="740" height="160" fill="url(#heroGrad)" clip-path="url(#win)"/>

  <!-- Simulated video frame lines (field texture) -->
  <g opacity="0.08">
    <line x1="30" y1="80" x2="770" y2="80" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="100" x2="770" y2="100" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="120" x2="770" y2="120" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="140" x2="770" y2="140" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="160" x2="770" y2="160" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="180" x2="770" y2="180" stroke="#4ade80" stroke-width="1"/>
    <line x1="30" y1="200" x2="770" y2="200" stroke="#4ade80" stroke-width="1"/>
  </g>
  <!-- Vertical lines -->
  <g opacity="0.04">
    <line x1="150" y1="56" x2="150" y2="216" stroke="#4ade80" stroke-width="1"/>
    <line x1="270" y1="56" x2="270" y2="216" stroke="#4ade80" stroke-width="1"/>
    <line x1="390" y1="56" x2="390" y2="216" stroke="#4ade80" stroke-width="1"/>
    <line x1="510" y1="56" x2="510" y2="216" stroke="#4ade80" stroke-width="1"/>
    <line x1="630" y1="56" x2="630" y2="216" stroke="#4ade80" stroke-width="1"/>
  </g>

  <!-- Dark overlay for text readability -->
  <rect x="30" y="56" width="740" height="160" fill="rgba(0,0,0,0.55)"/>

  <!-- Navbar -->
  <rect x="30" y="56" width="740" height="36" fill="url(#navGrad)"/>
  <!-- Logo -->
  <text x="56" y="79" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="#4ade80">PCAT</text>
  <!-- Nav links -->
  <text x="580" y="79" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Galeri</text>
  <text x="630" y="79" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">Hakkında</text>
  <rect x="682" y="67" width="72" height="18" rx="9" fill="url(#uploadBtn)"/>
  <text x="718" y="80" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="white">+ Fotoğraf Ekle</text>

  <!-- Hero text -->
  <text x="400" y="126" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="white">Photo Catalog</text>
  <text x="400" y="148" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">Fotoğraflarını yükle, düzenle ve paylaş</text>

  <!-- Play/Pause + Discover buttons -->
  <rect x="332" y="160" width="72" height="22" rx="11" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="368" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="white">▶  Oynat</text>
  <rect x="416" y="160" width="72" height="22" rx="11" fill="url(#uploadBtn)"/>
  <text x="452" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="white">Keşfet ↓</text>

  <!-- ── PHOTO GRID ── -->
  <rect x="30" y="216" width="740" height="210" fill="#111" clip-path="url(#win)"/>

  <!-- Section title -->
  <text x="56" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="white">📸  Fotoğraf Galerisi</text>
  <text x="690" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#4ade80">Sayfa 1 / 3</text>

  <!-- Photo cards row -->
  <!-- Card 1 -->
  <rect x="46" y="250" width="160" height="120" rx="8" fill="url(#p1)" filter="url(#shadow)"/>
  <rect x="46" y="310" width="160" height="60" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="46" y="330" width="160" height="40" rx="0" fill="rgba(0,0,0,0.7)"/>
  <rect x="46" y="358" width="160" height="12" rx="0,0,8,8" fill="rgba(0,0,0,0.8)"/>
  <!-- Mountain/landscape icon -->
  <polygon points="80,295 110,265 140,295" fill="rgba(255,255,255,0.15)"/>
  <polygon points="100,295 125,272 150,295" fill="rgba(255,255,255,0.1)"/>
  <circle cx="140" cy="268" r="8" fill="rgba(255,220,0,0.3)"/>
  <text x="126" y="323" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="white">Orman Manzarası</text>
  <text x="126" y="335" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.5)">Doğa fotoğrafı...</text>
  <!-- Action buttons -->
  <rect x="52" y="356" width="42" height="14" rx="3" fill="#15803d"/>
  <text x="73" y="366" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Düzenle</text>
  <rect x="100" y="356" width="36" height="14" rx="3" fill="#991b1b"/>
  <text x="118" y="366" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Sil</text>
  <rect x="142" y="356" width="56" height="14" rx="3" fill="#1d4ed8"/>
  <text x="170" y="366" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Detaylar →</text>

  <!-- Card 2 -->
  <rect x="226" y="250" width="160" height="120" rx="8" fill="url(#p2)" filter="url(#shadow)"/>
  <rect x="226" y="346" width="160" height="24" rx="0" fill="rgba(0,0,0,0.7)"/>
  <rect x="226" y="358" width="160" height="12" rx="0,0,8,8" fill="rgba(0,0,0,0.8)"/>
  <!-- Sea/waves icon -->
  <path d="M226 300 Q266 285 306 300 Q266 315 226 300Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M226 310 Q266 295 306 310 Q266 325 226 310Z" fill="rgba(255,255,255,0.07)"/>
  <circle cx="276" cy="270" r="12" fill="rgba(255,200,0,0.25)"/>
  <text x="306" y="356" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="white">Şehir Işıkları</text>
  <rect x="232" y="358" width="42" height="14" rx="3" fill="#15803d"/>
  <text x="253" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Düzenle</text>
  <rect x="280" y="358" width="36" height="14" rx="3" fill="#991b1b"/>
  <text x="298" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Sil</text>
  <rect x="322" y="358" width="56" height="14" rx="3" fill="#1d4ed8"/>
  <text x="350" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Detaylar →</text>

  <!-- Card 3 -->
  <rect x="406" y="250" width="160" height="120" rx="8" fill="url(#p3)" filter="url(#shadow)"/>
  <rect x="406" y="346" width="160" height="24" rx="0" fill="rgba(0,0,0,0.7)"/>
  <rect x="406" y="358" width="160" height="12" rx="0,0,8,8" fill="rgba(0,0,0,0.8)"/>
  <circle cx="486" cy="275" r="16" fill="rgba(255,150,0,0.3)"/>
  <path d="M450 295 L470 275 L490 290 L510 270 L530 295 Z" fill="rgba(255,255,255,0.1)"/>
  <text x="486" y="356" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="600" fill="white">Gün Batımı</text>
  <rect x="412" y="358" width="42" height="14" rx="3" fill="#15803d"/>
  <text x="433" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Düzenle</text>
  <rect x="460" y="358" width="36" height="14" rx="3" fill="#991b1b"/>
  <text x="478" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Sil</text>
  <rect x="502" y="358" width="56" height="14" rx="3" fill="#1d4ed8"/>
  <text x="530" y="368" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7" fill="white">Detaylar →</text>

  <!-- Upload card (add new) -->
  <rect x="586" y="250" width="160" height="120" rx="8" fill="#1a1a1a" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="666" y="295" text-anchor="middle" font-family="Arial" font-size="28" fill="#4ade80" opacity="0.6">+</text>
  <text x="666" y="315" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#4ade80" opacity="0.8">Fotoğraf Yükle</text>
  <text x="666" y="328" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#555">Başlık &amp; açıklama</text>
  <text x="666" y="340" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#555">ekleyebilirsiniz</text>
  <rect x="626" y="352" width="80" height="14" rx="7" fill="#166534"/>
  <text x="666" y="362" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" font-weight="600" fill="white">Dosya Seç</text>

  <!-- Pagination -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="9">
    <rect x="338" y="396" width="24" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="350" y="409" text-anchor="middle" fill="#555">‹</text>
    <rect x="366" y="396" width="24" height="18" rx="4" fill="#15803d"/>
    <text x="378" y="409" text-anchor="middle" fill="white">1</text>
    <rect x="394" y="396" width="24" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="406" y="409" text-anchor="middle" fill="#aaa">2</text>
    <rect x="422" y="396" width="24" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="434" y="409" text-anchor="middle" fill="#aaa">3</text>
    <rect x="450" y="396" width="24" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="462" y="409" text-anchor="middle" fill="#aaa">›</text>
  </g>

  <!-- Tech stack bottom bar -->
  <rect x="30" y="414" width="740" height="12" fill="#0a0a0a" clip-path="url(#win)"/>
  <text x="56" y="423" font-family="'Segoe UI',Arial,sans-serif" font-size="7.5" fill="#3f3f3f">Node.js  ·  Express.js  ·  MongoDB  ·  Mongoose  ·  EJS  ·  express-fileupload  ·  method-override</text>
</svg>
